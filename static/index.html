<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wakatta — Handwriting</title>
<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#1a1a2e">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a1a2e;
    color: #e0e0e0;
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 24px 16px;
    gap: 20px;
  }

  h1 { font-size: 1.1rem; letter-spacing: 0.1em; color: #aaa; }

  #canvas-wrap {
    position: relative;
    border: 2px solid #444;
    border-radius: 8px;
    overflow: hidden;
    touch-action: none;
  }

  #canvas {
    display: block;
    background: #0d0d1a;
    cursor: crosshair;
  }

  #controls {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  button {
    padding: 8px 20px;
    border: 1px solid #555;
    border-radius: 6px;
    background: #2a2a3e;
    color: #ddd;
    cursor: pointer;
    font-size: 0.95rem;
  }
  button:hover { background: #3a3a5e; }

  #status {
    font-size: 0.85rem;
    color: #888;
    min-width: 120px;
  }

  #stroke-count {
    font-size: 0.85rem;
    color: #aaa;
  }

  #candidates {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    max-width: 520px;
  }

  .candidate {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 10px 14px;
    border: 1px solid #444;
    border-radius: 8px;
    background: #2a2a3e;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    min-width: 60px;
  }
  .candidate:hover { background: #3e3e60; border-color: #7070cc; }
  .candidate.selected { background: #3a3a7a; border-color: #8888ff; }

  .candidate-char {
    font-size: 2.4rem;
    line-height: 1;
  }

  .candidate-score {
    font-size: 0.65rem;
    color: #777;
  }

  #confirmed {
    font-size: 2rem;
    letter-spacing: 0.15em;
    min-height: 2.5rem;
    color: #ccc;
  }

  #confirmed-label {
    font-size: 0.8rem;
    color: #666;
    text-align: center;
  }

  #connection-badge {
    position: fixed;
    top: 10px;
    right: 12px;
    font-size: 0.7rem;
    padding: 3px 8px;
    border-radius: 10px;
    background: #2a2a3e;
    border: 1px solid #444;
    color: #888;
    pointer-events: none;
  }
  #connection-badge.offline { color: #f0a060; border-color: #665030; }
  #connection-badge.online  { color: #60c080; border-color: #305030; }
</style>
</head>
<body>

<div id="connection-badge">loading</div>

<h1>わかった — Handwriting Recognition</h1>

<div id="canvas-wrap">
  <canvas id="canvas" width="480" height="480"></canvas>
</div>

<div id="controls">
  <button id="clear-btn">Clear</button>
  <span id="stroke-count">0 strokes</span>
  <span id="status">Loading database…</span>
</div>

<div id="candidates"></div>

<div id="confirmed-label">Confirmed</div>
<div id="confirmed"></div>

<script type="module">
import { loadDb, recognize } from '/static/recognizer.js';

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const candidatesEl = document.getElementById('candidates');
const statusEl = document.getElementById('status');
const strokeCountEl = document.getElementById('stroke-count');
const confirmedEl = document.getElementById('confirmed');
const badgeEl = document.getElementById('connection-badge');

ctx.strokeStyle = '#e8e8ff';
ctx.lineWidth = 3;
ctx.lineCap = 'round';
ctx.lineJoin = 'round';

// --- Connection badge ---

function updateBadge() {
  if (navigator.onLine) {
    badgeEl.textContent = 'online';
    badgeEl.className = 'online';
  } else {
    badgeEl.textContent = 'offline';
    badgeEl.className = 'offline';
  }
}
updateBadge();
window.addEventListener('online', updateBadge);
window.addEventListener('offline', updateBadge);

// --- Load KanjiVG database ---

let db = null;

try {
  db = await loadDb('/static/db.json');
  statusEl.textContent = 'Draw a character';
} catch (err) {
  statusEl.textContent = 'DB load failed';
  console.error('Failed to load db.json:', err);
}

// --- Service worker ---

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/static/sw.js').catch(err => {
    console.warn('SW registration failed:', err);
  });
}

// --- Drawing ---

let strokes = [];
let currentStroke = [];
let drawing = false;
let recognizeTimer = null;

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const src = e.touches ? e.touches[0] : e;
  return {
    x: (src.clientX - rect.left) * scaleX,
    y: (src.clientY - rect.top) * scaleY,
  };
}

canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  drawing = true;
  currentStroke = [];
  const pt = getPos(e);
  currentStroke.push(pt);
  ctx.beginPath();
  ctx.moveTo(pt.x, pt.y);
  clearTimeout(recognizeTimer);
  statusEl.textContent = 'Drawing…';
});

canvas.addEventListener('pointermove', e => {
  if (!drawing) return;
  e.preventDefault();
  const pt = getPos(e);
  currentStroke.push(pt);
  ctx.lineTo(pt.x, pt.y);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(pt.x, pt.y);
});

canvas.addEventListener('pointerup', e => {
  if (!drawing) return;
  drawing = false;
  if (currentStroke.length >= 2) {
    strokes.push(currentStroke);
    strokeCountEl.textContent = `${strokes.length} stroke${strokes.length !== 1 ? 's' : ''}`;
  }
  currentStroke = [];
  clearTimeout(recognizeTimer);
  recognizeTimer = setTimeout(runRecognition, 700);
});

canvas.addEventListener('pointerleave', e => {
  if (drawing) canvas.dispatchEvent(new PointerEvent('pointerup', e));
});

canvas.addEventListener('touchstart', e => e.preventDefault(), { passive: false });
canvas.addEventListener('touchmove',  e => e.preventDefault(), { passive: false });

// --- Recognition ---

function runRecognition() {
  if (strokes.length === 0 || !db) return;
  statusEl.textContent = 'Recognizing…';
  candidatesEl.innerHTML = '';

  const candidates = recognize(strokes, db, 12);
  displayCandidates(candidates);
  statusEl.textContent = `${candidates.length} candidates`;
}

function displayCandidates(candidates) {
  candidatesEl.innerHTML = '';
  candidates.forEach(c => {
    const el = document.createElement('div');
    el.className = 'candidate';
    el.innerHTML = `
      <span class="candidate-char">${c.char}</span>
      <span class="candidate-score">${c.score.toFixed(1)}</span>
    `;
    el.addEventListener('click', () => confirmChar(c.char, el));
    candidatesEl.appendChild(el);
  });
}

function confirmChar(char, el) {
  document.querySelectorAll('.candidate').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  confirmedEl.textContent += char;
  setTimeout(clearCanvas, 300);
}

// --- Clear ---

document.getElementById('clear-btn').addEventListener('click', clearCanvas);

function clearCanvas() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  strokes = [];
  currentStroke = [];
  clearTimeout(recognizeTimer);
  candidatesEl.innerHTML = '';
  statusEl.textContent = 'Draw a character';
  strokeCountEl.textContent = '0 strokes';
}
</script>
</body>
</html>
