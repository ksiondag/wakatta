<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wakatta — Handwriting</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a1a2e;
    color: #e0e0e0;
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 24px 16px;
    gap: 20px;
  }

  h1 { font-size: 1.1rem; letter-spacing: 0.1em; color: #aaa; }

  #canvas-wrap {
    position: relative;
    border: 2px solid #444;
    border-radius: 8px;
    overflow: hidden;
    touch-action: none;
  }

  #canvas {
    display: block;
    background: #0d0d1a;
    cursor: crosshair;
  }

  #controls {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  button {
    padding: 8px 20px;
    border: 1px solid #555;
    border-radius: 6px;
    background: #2a2a3e;
    color: #ddd;
    cursor: pointer;
    font-size: 0.95rem;
  }
  button:hover { background: #3a3a5e; }

  #status {
    font-size: 0.85rem;
    color: #888;
    min-width: 120px;
  }

  #stroke-count {
    font-size: 0.85rem;
    color: #aaa;
  }

  #candidates {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    max-width: 520px;
  }

  .candidate {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 10px 14px;
    border: 1px solid #444;
    border-radius: 8px;
    background: #2a2a3e;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    min-width: 60px;
  }
  .candidate:hover { background: #3e3e60; border-color: #7070cc; }
  .candidate.selected { background: #3a3a7a; border-color: #8888ff; }

  .candidate-char {
    font-size: 2.4rem;
    line-height: 1;
  }

  .candidate-score {
    font-size: 0.65rem;
    color: #777;
  }

  #confirmed {
    font-size: 2rem;
    letter-spacing: 0.15em;
    min-height: 2.5rem;
    color: #ccc;
  }

  #confirmed-label {
    font-size: 0.8rem;
    color: #666;
    text-align: center;
  }
</style>
</head>
<body>

<h1>わかった — Handwriting Recognition</h1>

<div id="canvas-wrap">
  <canvas id="canvas" width="480" height="480"></canvas>
</div>

<div id="controls">
  <button id="clear-btn">Clear</button>
  <span id="stroke-count">0 strokes</span>
  <span id="status">Draw a character</span>
</div>

<div id="candidates"></div>

<div id="confirmed-label">Confirmed</div>
<div id="confirmed"></div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const candidatesEl = document.getElementById('candidates');
const statusEl = document.getElementById('status');
const strokeCountEl = document.getElementById('stroke-count');
const confirmedEl = document.getElementById('confirmed');

ctx.strokeStyle = '#e8e8ff';
ctx.lineWidth = 3;
ctx.lineCap = 'round';
ctx.lineJoin = 'round';

let strokes = [];        // completed strokes: [{x,y}, ...]
let currentStroke = [];  // in-progress stroke
let drawing = false;
let recognizeTimer = null;

// --- Drawing ---

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const src = e.touches ? e.touches[0] : e;
  return {
    x: (src.clientX - rect.left) * scaleX,
    y: (src.clientY - rect.top) * scaleY,
  };
}

canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  drawing = true;
  currentStroke = [];
  const pt = getPos(e);
  currentStroke.push(pt);
  ctx.beginPath();
  ctx.moveTo(pt.x, pt.y);
  clearTimeout(recognizeTimer);
  statusEl.textContent = 'Drawing…';
});

canvas.addEventListener('pointermove', e => {
  if (!drawing) return;
  e.preventDefault();
  const pt = getPos(e);
  currentStroke.push(pt);
  ctx.lineTo(pt.x, pt.y);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(pt.x, pt.y);
});

canvas.addEventListener('pointerup', e => {
  if (!drawing) return;
  drawing = false;
  if (currentStroke.length >= 2) {
    strokes.push(currentStroke);
    strokeCountEl.textContent = `${strokes.length} stroke${strokes.length !== 1 ? 's' : ''}`;
  }
  currentStroke = [];
  clearTimeout(recognizeTimer);
  recognizeTimer = setTimeout(sendForRecognition, 700);
});

canvas.addEventListener('pointerleave', e => {
  if (drawing) canvas.dispatchEvent(new PointerEvent('pointerup', e));
});

// Prevent scroll on touch devices while drawing
canvas.addEventListener('touchstart', e => e.preventDefault(), { passive: false });
canvas.addEventListener('touchmove',  e => e.preventDefault(), { passive: false });

// --- Recognition ---

async function sendForRecognition() {
  if (strokes.length === 0) return;
  statusEl.textContent = 'Recognizing…';
  candidatesEl.innerHTML = '';

  try {
    const res = await fetch('/recognize', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ strokes: strokes.map(pts => ({ points: pts })) }),
    });
    const candidates = await res.json();
    displayCandidates(candidates);
    statusEl.textContent = `${candidates.length} candidates`;
  } catch (err) {
    statusEl.textContent = 'Error — is the server running?';
  }
}

function displayCandidates(candidates) {
  candidatesEl.innerHTML = '';
  candidates.forEach((c, i) => {
    const el = document.createElement('div');
    el.className = 'candidate';
    el.innerHTML = `
      <span class="candidate-char">${c.char}</span>
      <span class="candidate-score">${c.score.toFixed(1)}</span>
    `;
    el.addEventListener('click', () => confirm(c.char, el));
    candidatesEl.appendChild(el);
  });
}

function confirm(char, el) {
  document.querySelectorAll('.candidate').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  confirmedEl.textContent += char;
  // Clear canvas for next character
  setTimeout(() => {
    clearCanvas();
  }, 300);
}

// --- Clear ---

document.getElementById('clear-btn').addEventListener('click', clearCanvas);

function clearCanvas() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  strokes = [];
  currentStroke = [];
  clearTimeout(recognizeTimer);
  candidatesEl.innerHTML = '';
  statusEl.textContent = 'Draw a character';
  strokeCountEl.textContent = '0 strokes';
}
</script>
</body>
</html>
