<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Wakatta — Reader</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: #1a1a2e;
  color: #e0e0e0;
  font-family: sans-serif;
  font-size: 14px;
}

.layout {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

button {
  padding: 6px 16px;
  border: 1px solid #555;
  border-radius: 5px;
  background: #2a2a3e;
  color: #ddd;
  cursor: pointer;
  font-size: 0.9rem;
  white-space: nowrap;
}
button:hover { background: #3a3a5e; }
button:disabled { opacity: 0.4; cursor: default; }

input[type="text"] {
  padding: 6px 10px;
  background: #0d0d1a;
  border: 1px solid #444;
  border-radius: 5px;
  color: #ddd;
  font-size: 0.9rem;
}
input:focus { outline: none; border-color: #7070cc; }

/* ══════════════════════════════════════════
   READER VIEW
══════════════════════════════════════════ */

#reader-view {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.reader-header {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 8px 14px;
  background: #12122a;
  border-bottom: 1px solid #2a2a44;
}

#back-btn { padding: 5px 12px; font-size: 0.85rem; text-decoration: none; }
#reader-work-title { flex: 1; font-size: 0.95rem; color: #aaa; }

#sync-status { font-size: 0.78rem; color: #888; white-space: nowrap; }
#sync-status.pending { color: #c8a040; }

#edit-mode-btn { font-size: 0.85rem; padding: 5px 12px; }
#edit-mode-btn.active { background: #4a2a2a; border-color: #6a4a4a; color: #e09090; }
#edit-mode-btn.active:hover { background: #5a3434; }

.page-nav {
  display: flex;
  align-items: center;
  gap: 10px;
}
.page-nav button { padding: 4px 12px; font-size: 0.9rem; }
#page-counter { font-size: 0.85rem; color: #888; min-width: 80px; text-align: center; }

.reader-main {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* ── Image panel ── */
.image-panel {
  flex: 1;
  position: relative;
  overflow: hidden;
  padding: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  touch-action: none;
}

#image-container {
  position: relative;
  display: inline-block;
  line-height: 0;
  transform-origin: center center;
  cursor: grab;
}
#image-container.edit-mode { cursor: crosshair; }

#zoom-reset-btn {
  position: absolute;
  top: 10px;
  right: 10px;
  z-index: 2;
  font-size: 0.8rem;
  padding: 5px 10px;
  opacity: 0.8;
}
#zoom-reset-btn:hover { opacity: 1; }

#page-img { display: block; max-width: 100%; height: auto; }

#bbox-svg {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
}
#bbox-svg rect { transition: fill 0.1s, stroke-width 0.1s; }
#bbox-svg rect.pending-box { stroke-dasharray: 10 6; }
#bbox-svg rect.draw-preview { fill: rgba(120,150,255,0.12); stroke: #7090ff; stroke-width: 3; stroke-dasharray: 8 5; pointer-events: none; }

/* ── Handwriting panel ── */
.hw-panel {
  width: 360px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  border-left: 1px solid #2a2a44;
  background: #161628;
  overflow-y: auto;
}

.region-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 14px;
  border-bottom: 1px solid #2a2a44;
  background: #12122a;
}
#region-counter { font-size: 0.85rem; color: #888; }
.region-nav button { padding: 4px 10px; font-size: 0.8rem; }

.region-info {
  padding: 12px 14px;
  border-bottom: 1px solid #2a2a44;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.region-info .label {
  font-size: 0.75rem; color: #666;
  text-transform: uppercase; letter-spacing: 0.05em;
}
.region-info-header { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
#direction-toggle { padding: 3px 8px; font-size: 0.75rem; }
#ocr-text { font-size: 1.1rem; color: #777; min-height: 1.4em; letter-spacing: 0.08em; word-break: break-all; }

.user-text-row { display: flex; gap: 6px; align-items: center; }
#user-text {
  flex: 1; padding: 6px 8px;
  background: #0d0d1a; border: 1px solid #555; border-radius: 5px;
  color: #e8e8ff; font-size: 1.2rem; letter-spacing: 0.1em;
}
#user-text:focus { outline: none; border-color: #7070cc; }
#undo-char { padding: 6px 10px; font-size: 1rem; }

.save-row { display: flex; align-items: center; gap: 8px; }
#save-status { font-size: 0.78rem; color: #666; }
#delete-btn { padding: 5px 10px; font-size: 0.85rem; border-color: #6a4040; color: #d09090; }
#delete-btn:hover { background: #4a2a2a; }

.canvas-section {
  padding: 14px;
  border-bottom: 1px solid #2a2a44;
  display: flex; flex-direction: column; align-items: center; gap: 8px;
}
#canvas-wrap { border: 2px solid #333; border-radius: 6px; overflow: hidden; }
#hw-canvas {
  display: block; background: #0d0d1a;
  cursor: crosshair; touch-action: none;
}
.hw-controls { display: flex; gap: 10px; align-items: center; width: 100%; }
#hw-status   { font-size: 0.8rem; color: #888; flex: 1; }
#stroke-count{ font-size: 0.8rem; color: #aaa; }

#candidates { padding: 10px 14px; display: flex; flex-wrap: wrap; gap: 8px; }

.candidate {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding: 8px 10px; border: 1px solid #444; border-radius: 6px;
  background: #2a2a3e; cursor: pointer; min-width: 50px;
  transition: background 0.1s, border-color 0.1s;
}
.candidate:hover { background: #3e3e60; border-color: #7070cc; }
.candidate.selected { background: #3a3a7a; border-color: #8888ff; }
.candidate-char  { font-size: 2rem; line-height: 1; }
.candidate-score { font-size: 0.6rem; color: #666; }

#hw-empty { padding: 24px 14px; color: #555; text-align: center; font-size: 0.9rem; line-height: 1.6; }

@media (max-width: 700px) {
  .reader-main { flex-direction: column; }
  .hw-panel { width: 100%; border-left: none; border-top: 1px solid #2a2a44; }
}
</style>
</head>
<body>
<div class="layout">

  <div id="reader-view">

    <div class="reader-header">
      <a id="back-btn" href="/page-reader">← Library</a>
      <span id="reader-work-title"></span>
      <span id="sync-status"></span>
      <button id="edit-mode-btn" title="Draw new boxes / move &amp; resize existing ones (disables pan &amp; zoom)">▭ Edit Boxes</button>
      <div class="page-nav">
        <button id="prev-page">◀</button>
        <span id="page-counter">—</span>
        <button id="next-page">▶</button>
      </div>
    </div>

    <div class="reader-main">

      <div class="image-panel">
        <button id="zoom-reset-btn" title="Reset zoom to fit the full page">⤢ Fit</button>
        <div id="image-container">
          <img id="page-img" alt="manga page">
          <svg id="bbox-svg" xmlns="http://www.w3.org/2000/svg"></svg>
        </div>
      </div>

      <div class="hw-panel">

        <div class="region-nav" id="region-nav">
          <button id="prev-region">◀</button>
          <span id="region-counter">—</span>
          <button id="next-region">▶</button>
        </div>

        <div class="region-info" id="region-info" style="display:none">
          <div class="region-info-header">
            <div class="label" id="ocr-label">OCR (auto-detected)</div>
            <button id="direction-toggle" title="Toggle vertical/horizontal text direction">↕ v</button>
          </div>
          <div id="ocr-text">—</div>
          <div class="label">Your text</div>
          <div class="user-text-row">
            <input id="user-text" type="text" placeholder="Confirm characters below…">
            <button id="undo-char" title="Remove last character">⌫</button>
          </div>
          <div class="save-row">
            <button id="save-btn">Save</button>
            <button id="delete-btn" title="Delete this bounding box">🗑 Delete</button>
            <span id="save-status"></span>
          </div>
        </div>

        <div class="canvas-section">
          <div id="canvas-wrap">
            <canvas id="hw-canvas" width="320" height="320"></canvas>
          </div>
          <div class="hw-controls">
            <button id="clear-btn">Clear</button>
            <span id="stroke-count">0 strokes</span>
            <span id="hw-status">Select a region</span>
          </div>
        </div>

        <div id="candidates"></div>
        <div id="hw-empty">← Select a bounding box to start transcribing</div>

      </div>
    </div>
  </div>

</div>
<script type="module">
import { loadDb, recognize } from '/static/recognizer.js';

// ── Work id from URL ─────────────────────────────────────────────────────────

const workId = parseInt(location.pathname.match(/\/read\/(\d+)/)?.[1], 10);
const initialPage = parseInt(new URLSearchParams(location.search).get('page'), 10);

// ── KanjiVG db ─────────────────────────────────────────────────────────────────

let kwDb = null;
try { kwDb = await loadDb('/static/db.json'); } catch (e) { console.error(e); }

const hwCtx = document.getElementById('hw-canvas').getContext('2d');
hwCtx.strokeStyle = '#e8e8ff';
hwCtx.lineWidth = 3;
hwCtx.lineCap = 'round';
hwCtx.lineJoin = 'round';

// ── State ──────────────────────────────────────────────────────────────────────

let currentPages = [];
let currentPageIdx = 0;
let pageData     = null;     // full /api/pages/{id} response
let sentences    = [];
let activeIdx    = null;

// ── Element refs ───────────────────────────────────────────────────────────────

const readerTitleEl  = document.getElementById('reader-work-title');
const prevPageBtnEl  = document.getElementById('prev-page');
const nextPageBtnEl  = document.getElementById('next-page');
const pageCounterEl  = document.getElementById('page-counter');

const imagePanelEl    = document.querySelector('.image-panel');
const imageContainerEl = document.getElementById('image-container');
const pageImgEl      = document.getElementById('page-img');
const bboxSvgEl      = document.getElementById('bbox-svg');

const regionNavEl    = document.getElementById('region-nav');
const regionCtrEl    = document.getElementById('region-counter');
const prevRegBtnEl   = document.getElementById('prev-region');
const nextRegBtnEl   = document.getElementById('next-region');
const regionInfoEl   = document.getElementById('region-info');
const ocrTextEl      = document.getElementById('ocr-text');
const userTextEl     = document.getElementById('user-text');
const undoBtnEl      = document.getElementById('undo-char');
const saveBtnEl      = document.getElementById('save-btn');
const deleteBtnEl    = document.getElementById('delete-btn');
const saveStatEl     = document.getElementById('save-status');
const hwCanvasEl     = document.getElementById('hw-canvas');
const candidatesEl   = document.getElementById('candidates');
const clearBtnEl     = document.getElementById('clear-btn');
const strokeCntEl    = document.getElementById('stroke-count');
const hwStatEl       = document.getElementById('hw-status');
const hwEmptyEl      = document.getElementById('hw-empty');

const syncStatusEl     = document.getElementById('sync-status');
const editModeBtnEl    = document.getElementById('edit-mode-btn');
const ocrLabelEl       = document.getElementById('ocr-label');
const directionToggleEl = document.getElementById('direction-toggle');

// ── Offline bbox edit queue ─────────────────────────────────────────────────────
// Custom boxes (and edits to existing ones) are queued locally first, since OCR
// only runs on the server. The queue is flushed whenever the app is online.

const QUEUE_KEY = 'wakatta:bboxQueue';
let opQueue = (() => {
  try { return JSON.parse(localStorage.getItem(QUEUE_KEY)) ?? []; } catch { return []; }
})();
let flushing = false;
let tempIdCounter = 0;

function persistQueue() {
  localStorage.setItem(QUEUE_KEY, JSON.stringify(opQueue));
}

function updateSyncStatus() {
  if (!opQueue.length) {
    syncStatusEl.textContent = '';
    syncStatusEl.classList.remove('pending');
    return;
  }
  syncStatusEl.textContent = navigator.onLine
    ? `Syncing ${opQueue.length}…`
    : `${opQueue.length} pending (offline)`;
  syncStatusEl.classList.add('pending');
}

// Queues whatever local state `sentences[idx]` currently holds (geometry,
// direction, user_text) — find-or-create the queued op so repeated edits to the
// same box (still offline) coalesce into one pending request instead of piling up.
function syncSentence(idx) {
  const s = sentences[idx];
  const fields = { x1: s.x1, y1: s.y1, x2: s.x2, y2: s.y2, direction: s.direction, user_text: s.user_text };

  if (s.tempId) {
    let op = opQueue.find(o => o.type === 'create' && o.tempId === s.tempId);
    if (!op) { op = { type: 'create', tempId: s.tempId, pageId: pageData.id }; opQueue.push(op); }
    Object.assign(op, fields);
  } else {
    let op = opQueue.find(o => o.type === 'update' && o.sentenceId === s.id);
    if (!op) { op = { type: 'update', sentenceId: s.id, pageId: pageData.id }; opQueue.push(op); }
    Object.assign(op, fields);
  }
  persistQueue();
  updateSyncStatus();
  flushQueue();
}

// Removes a box. Not-yet-synced boxes are simply dropped from the queue; synced
// ones get a queued 'delete' op (any pending 'update' for the same box is dropped
// first, since there's no point syncing edits to something about to be deleted).
function deleteSentence(idx) {
  const s = sentences[idx];
  sentences.splice(idx, 1);

  if (s.tempId) {
    opQueue = opQueue.filter(o => !(o.type === 'create' && o.tempId === s.tempId));
  } else {
    opQueue = opQueue.filter(o => !(o.type === 'update' && o.sentenceId === s.id));
    opQueue.push({ type: 'delete', sentenceId: s.id, pageId: pageData.id });
  }
  persistQueue();
  updateSyncStatus();
  flushQueue();
}

async function flushQueue() {
  if (flushing) return;
  flushing = true;
  try {
    while (opQueue.length) {
      const op = opQueue[0];
      let res;
      try {
        if (op.type === 'create') {
          const body = JSON.stringify({ x1: op.x1, y1: op.y1, x2: op.x2, y2: op.y2, direction: op.direction, user_text: op.user_text });
          res = await fetch(`/api/pages/${op.pageId}/sentences`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body });
        } else if (op.type === 'update') {
          const body = JSON.stringify({ x1: op.x1, y1: op.y1, x2: op.x2, y2: op.y2, direction: op.direction, user_text: op.user_text });
          res = await fetch(`/api/sentences/${op.sentenceId}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body });
        } else {
          res = await fetch(`/api/sentences/${op.sentenceId}`, { method: 'DELETE' });
        }
      } catch {
        break; // offline / network failure — stop and retry later
      }
      if (!res.ok && res.status !== 404) break; // 404 on delete = already gone, treat as done

      const onCurrentPage = currentPages[currentPageIdx]?.id === op.pageId;
      if (op.type === 'delete') {
        opQueue.shift();
        persistQueue();
      } else {
        const data = await res.json();
        opQueue.shift();
        persistQueue();
        if (onCurrentPage) {
          const idx = op.type === 'create'
            ? sentences.findIndex(s => s.tempId === op.tempId)
            : sentences.findIndex(s => s.id === op.sentenceId);
          if (idx !== -1) {
            sentences[idx] = { ...data, pending: false };
            renderBoxes();
            if (activeIdx === idx) selectRegion(idx);
          }
        }
      }
      updateSyncStatus();
    }
  } finally {
    flushing = false;
    updateSyncStatus();
  }
}

window.addEventListener('online', flushQueue);

// ── Load work + pages ────────────────────────────────────────────────────────

async function loadReader() {
  const [works, pages] = await Promise.all([
    fetch('/api/works').then(r => r.json()),
    fetch(`/api/works/${workId}/pages`).then(r => r.json()),
  ]);
  const work = works.find(w => w.id === workId);
  readerTitleEl.textContent = work ? work.title : '';
  currentPages = pages;
  if (!currentPages.length) {
    pageCounterEl.textContent = 'No pages';
    return;
  }
  const startIdx = Number.isInteger(initialPage) ? initialPage - 1 : 0;
  await navigateTo(startIdx);
}

prevPageBtnEl.addEventListener('click', () => navigateTo(currentPageIdx - 1));
nextPageBtnEl.addEventListener('click', () => navigateTo(currentPageIdx + 1));

async function navigateTo(idx) {
  if (!currentPages.length) return;
  idx = Math.max(0, Math.min(idx, currentPages.length - 1));
  currentPageIdx = idx;

  prevPageBtnEl.disabled = idx === 0;
  nextPageBtnEl.disabled = idx === currentPages.length - 1;
  pageCounterEl.textContent = `Page ${idx + 1} / ${currentPages.length}`;
  history.replaceState(null, '', `/read/${workId}?page=${idx + 1}`);

  const pageRecord = currentPages[idx];
  const res = await fetch(`/api/pages/${pageRecord.id}`);
  pageData  = await res.json();
  activeIdx = null;

  // Overlay any not-yet-synced local edits/creates/deletes on top of the server's data.
  sentences = pageData.sentences
    .filter(s => !opQueue.some(op => op.type === 'delete' && op.sentenceId === s.id))
    .map(s => {
      const upd = opQueue.find(op => op.type === 'update' && op.sentenceId === s.id);
      return upd
        ? { ...s, x1: upd.x1, y1: upd.y1, x2: upd.x2, y2: upd.y2, direction: upd.direction, user_text: upd.user_text, pending: true }
        : s;
    });
  sentences.push(...opQueue
    .filter(op => op.type === 'create' && op.pageId === pageRecord.id)
    .map(op => ({
      id: null, tempId: op.tempId,
      x1: op.x1, y1: op.y1, x2: op.x2, y2: op.y2, direction: op.direction,
      ocr_text: null, user_text: op.user_text ?? null, pending: true,
    })));

  pageImgEl.src = `/api/pages/${pageRecord.id}/image`;
  pageImgEl.onload = () => resetZoom(); // refine fit-scale once real dimensions are laid out
  bboxSvgEl.setAttribute('viewBox', `0 0 ${pageData.width} ${pageData.height}`);
  renderBoxes();

  regionInfoEl.style.display = 'none';
  hwEmptyEl.style.display = 'block';
  clearCanvas();
  hwStatEl.textContent = 'Select a region';
  resetZoom();
  flushQueue();
}

function renderBoxes() {
  bboxSvgEl.innerHTML = '';
  sentences.forEach((s, i) => {
    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('x', s.x1);
    rect.setAttribute('y', s.y1);
    rect.setAttribute('width', s.x2 - s.x1);
    rect.setAttribute('height', s.y2 - s.y1);
    rect.setAttribute('rx', '2');
    if (i === activeIdx) {
      rect.setAttribute('fill', 'rgba(100,100,255,0.18)');
      rect.setAttribute('stroke', '#8888ff');
      rect.setAttribute('stroke-width', '5');
    } else {
      rect.setAttribute('fill', s.user_text ? 'rgba(80,160,80,0.12)' : 'rgba(0,0,0,0.01)');
      rect.setAttribute('stroke', s.direction === 'v' ? '#00c864' : '#c87800');
      rect.setAttribute('stroke-width', '3');
    }
    if (s.pending) rect.classList.add('pending-box');
    rect.dataset.idx = i;
    rect.addEventListener('click', () => selectRegion(i));
    bboxSvgEl.appendChild(rect);

    const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    label.setAttribute('x', s.x1 + 3);
    label.setAttribute('y', s.y1 - 4);
    label.setAttribute('font-size', '18');
    label.setAttribute('fill', s.direction === 'v' ? '#00c864' : '#c87800');
    label.setAttribute('font-family', 'sans-serif');
    label.setAttribute('pointer-events', 'none');
    label.dataset.idx = i;
    label.textContent = s.pending ? `${i + 1} ⏳` : i + 1;
    bboxSvgEl.appendChild(label);
  });
}

// ── Page zoom & pan (pinch / ctrl-wheel / drag — scoped to the image panel only) ─

let zoomScale = 1, panX = 0, panY = 0;
let didDrag = false;
const MIN_ZOOM = 0.1, MAX_ZOOM = 4;

function applyTransform() {
  imageContainerEl.style.transform = `translate(${panX}px, ${panY}px) scale(${zoomScale})`;
}

function clampPan() {
  const scaledW = imageContainerEl.offsetWidth  * zoomScale;
  const scaledH = imageContainerEl.offsetHeight * zoomScale;
  const maxPanX = Math.max(0, (scaledW - imagePanelEl.clientWidth)  / 2);
  const maxPanY = Math.max(0, (scaledH - imagePanelEl.clientHeight) / 2);
  panX = Math.min(maxPanX, Math.max(-maxPanX, panX));
  panY = Math.min(maxPanY, Math.max(-maxPanY, panY));
}

// "Fit" scale shrinks the (already width-fit) page further if its full height
// doesn't fit the panel, so the default/reset view always shows the whole page.
function computeFitScale() {
  const h = imageContainerEl.offsetHeight;
  if (!h) return 1;
  return Math.min(1, imagePanelEl.clientHeight / h);
}

function resetZoom() {
  zoomScale = computeFitScale();
  panX = 0; panY = 0;
  applyTransform();
}

function setZoom(newScale) {
  zoomScale = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, newScale));
  clampPan();
  applyTransform();
}

imagePanelEl.addEventListener('wheel', e => {
  if (editMode) return;
  e.preventDefault();
  if (e.ctrlKey || e.metaKey) {
    setZoom(zoomScale * Math.exp(-e.deltaY * 0.01));
  } else {
    panX -= e.deltaX;
    panY -= e.deltaY;
    clampPan();
    applyTransform();
  }
}, { passive: false });

imagePanelEl.addEventListener('dblclick', () => { if (!editMode) resetZoom(); });
document.getElementById('zoom-reset-btn').addEventListener('click', () => resetZoom());

const activePointers = new Map();
let pinchStartDist = 0, pinchStartScale = 1;
let dragStart = null;

function pointerDist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

function onPointerMove(e) {
  if (!activePointers.has(e.pointerId)) return;
  activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

  if (activePointers.size >= 2) {
    const pts = [...activePointers.values()].slice(0, 2);
    const d = pointerDist(pts[0], pts[1]);
    if (pinchStartDist > 0) {
      setZoom(pinchStartScale * (d / pinchStartDist));
      didDrag = true;
    }
  } else if (dragStart) {
    const dx = e.clientX - dragStart.x;
    const dy = e.clientY - dragStart.y;
    if (Math.abs(dx) > 4 || Math.abs(dy) > 4) didDrag = true;
    panX = dragStart.panX + dx;
    panY = dragStart.panY + dy;
    clampPan();
    applyTransform();
  }
}

function onPointerUp(e) {
  activePointers.delete(e.pointerId);
  if (activePointers.size === 0) {
    window.removeEventListener('pointermove', onPointerMove);
    window.removeEventListener('pointerup', onPointerUp);
    window.removeEventListener('pointercancel', onPointerUp);
    dragStart = null;
    pinchStartDist = 0;
    if (!editMode) imageContainerEl.style.cursor = 'grab';
  } else if (activePointers.size === 1) {
    const [[, p]] = activePointers;
    dragStart = { x: p.x, y: p.y, panX, panY };
    pinchStartDist = 0;
  }
}

imagePanelEl.addEventListener('pointerdown', e => {
  if (editMode) { handleEditPointerDown(e); return; }
  if (e.pointerType === 'mouse' && e.button !== 0) return;
  if (activePointers.size === 0) {
    window.addEventListener('pointermove', onPointerMove);
    window.addEventListener('pointerup', onPointerUp);
    window.addEventListener('pointercancel', onPointerUp);
  }
  activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  didDrag = false;
  imageContainerEl.style.cursor = 'grabbing';

  if (activePointers.size === 1) {
    dragStart = { x: e.clientX, y: e.clientY, panX, panY };
  } else if (activePointers.size === 2) {
    dragStart = null;
    const pts = [...activePointers.values()];
    pinchStartDist = pointerDist(pts[0], pts[1]);
    pinchStartScale = zoomScale;
  }
});

// A pinch/drag gesture shouldn't also register as a region-select click.
bboxSvgEl.addEventListener('click', e => {
  if (didDrag) { e.stopPropagation(); e.preventDefault(); }
}, true);

window.addEventListener('resize', () => { clampPan(); applyTransform(); });

// ── Box editing mode (draw new boxes, move/resize existing ones) ───────────────
// Default mode is pan/zoom (above). This mode disables it entirely so gestures
// over the page only ever affect bounding boxes.

let editMode = false;
let editAction = null;
const MIN_BOX_PAGE_PX = 10; // minimum drawn box size, in page pixels, to keep it
const HANDLE_PX = 14;       // corner-grab tolerance, in screen px

editModeBtnEl.addEventListener('click', () => {
  editMode = !editMode;
  editModeBtnEl.classList.toggle('active', editMode);
  editModeBtnEl.textContent = editMode ? '✓ Editing Boxes' : '▭ Edit Boxes';
  imageContainerEl.classList.toggle('edit-mode', editMode);
  imageContainerEl.style.cursor = editMode ? 'crosshair' : 'grab';
});

function clientToSvg(clientX, clientY) {
  const ctm = bboxSvgEl.getScreenCTM();
  if (!ctm) return { x: 0, y: 0 };
  const pt = bboxSvgEl.createSVGPoint();
  pt.x = clientX; pt.y = clientY;
  const p = pt.matrixTransform(ctm.inverse());
  return { x: p.x, y: p.y };
}

function svgUnitsPerScreenPx() {
  const ctm = bboxSvgEl.getScreenCTM();
  if (!ctm) return 1;
  return 1 / Math.hypot(ctm.a, ctm.b);
}

function updateRectEl(idx) {
  const s = sentences[idx];
  const rect = bboxSvgEl.querySelector(`rect[data-idx="${idx}"]`);
  if (rect) {
    rect.setAttribute('x', s.x1); rect.setAttribute('y', s.y1);
    rect.setAttribute('width', s.x2 - s.x1); rect.setAttribute('height', s.y2 - s.y1);
  }
  const label = bboxSvgEl.querySelector(`text[data-idx="${idx}"]`);
  if (label) { label.setAttribute('x', s.x1 + 3); label.setAttribute('y', s.y1 - 4); }
}

// Hit-tests in SVG (page-pixel) space: corners/body of the selected box first
// (so the active box is always draggable even if it overlaps another), then
// falls back to any other box under the point (select + start moving it).
function hitTest(px, py) {
  if (activeIdx !== null) {
    const s = sentences[activeIdx];
    const tol = HANDLE_PX * svgUnitsPerScreenPx();
    const corners = { nw: [s.x1, s.y1], ne: [s.x2, s.y1], sw: [s.x1, s.y2], se: [s.x2, s.y2] };
    for (const [corner, [cx, cy]] of Object.entries(corners)) {
      if (Math.hypot(px - cx, py - cy) <= tol) return { type: 'resize', idx: activeIdx, corner };
    }
    if (px >= s.x1 && px <= s.x2 && py >= s.y1 && py <= s.y2) return { type: 'move', idx: activeIdx };
  }
  for (let i = sentences.length - 1; i >= 0; i--) {
    const s = sentences[i];
    if (px >= s.x1 && px <= s.x2 && py >= s.y1 && py <= s.y2) return { type: 'move', idx: i, reselect: true };
  }
  return null;
}

// Resize cursors follow the diagonal of the corner being dragged. Moving a box
// reuses the grab/grabbing metaphor from panning — same icon, different scope.
function cursorForHit(hit) {
  if (!hit) return 'crosshair';
  if (hit.type === 'move') return 'grab';
  return (hit.corner === 'nw' || hit.corner === 'se') ? 'nwse-resize' : 'nesw-resize';
}

// Hover feedback (no gesture in progress) — separate from the gesture-driven
// cursor changes below, which take over for the duration of an active drag.
imagePanelEl.addEventListener('pointermove', e => {
  if (editMode) {
    if (editAction) return;
    const p = clientToSvg(e.clientX, e.clientY);
    imageContainerEl.style.cursor = cursorForHit(hitTest(p.x, p.y));
  } else if (!dragStart && activePointers.size === 0) {
    imageContainerEl.style.cursor = 'grab';
  }
});

function handleEditPointerDown(e) {
  if (e.pointerType === 'mouse' && e.button !== 0) return;
  const p = clientToSvg(e.clientX, e.clientY);
  const hit = hitTest(p.x, p.y);
  didDrag = false;
  imageContainerEl.style.cursor = hit && hit.type === 'move' ? 'grabbing' : cursorForHit(hit);

  if (hit) {
    if (hit.reselect) selectRegion(hit.idx);
    const s = sentences[hit.idx];
    editAction = { ...hit, orig: { x1: s.x1, y1: s.y1, x2: s.x2, y2: s.y2 }, start: p };
  } else {
    const preview = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    preview.setAttribute('class', 'draw-preview');
    preview.setAttribute('x', p.x); preview.setAttribute('y', p.y);
    preview.setAttribute('width', 0); preview.setAttribute('height', 0);
    bboxSvgEl.appendChild(preview);
    editAction = { type: 'draw', start: p, previewEl: preview };
  }

  window.addEventListener('pointermove', handleEditPointerMove);
  window.addEventListener('pointerup', handleEditPointerUp);
  window.addEventListener('pointercancel', handleEditPointerUp);
}

function handleEditPointerMove(e) {
  if (!editAction) return;
  const p = clientToSvg(e.clientX, e.clientY);
  const dx = p.x - editAction.start.x;
  const dy = p.y - editAction.start.y;
  if (Math.abs(dx) > 2 || Math.abs(dy) > 2) didDrag = true;

  const maxW = pageData.width, maxH = pageData.height;

  if (editAction.type === 'draw') {
    const x1 = Math.max(0, Math.min(editAction.start.x, p.x));
    const y1 = Math.max(0, Math.min(editAction.start.y, p.y));
    const x2 = Math.min(maxW, Math.max(editAction.start.x, p.x));
    const y2 = Math.min(maxH, Math.max(editAction.start.y, p.y));
    editAction.previewEl.setAttribute('x', x1);
    editAction.previewEl.setAttribute('y', y1);
    editAction.previewEl.setAttribute('width', x2 - x1);
    editAction.previewEl.setAttribute('height', y2 - y1);
    editAction.final = { x1, y1, x2, y2 };
  } else if (editAction.type === 'move') {
    const s = sentences[editAction.idx];
    const o = editAction.orig;
    const w = o.x2 - o.x1, h = o.y2 - o.y1;
    const nx1 = Math.max(0, Math.min(maxW - w, o.x1 + dx));
    const ny1 = Math.max(0, Math.min(maxH - h, o.y1 + dy));
    s.x1 = nx1; s.y1 = ny1; s.x2 = nx1 + w; s.y2 = ny1 + h;
    updateRectEl(editAction.idx);
  } else if (editAction.type === 'resize') {
    const s = sentences[editAction.idx];
    const o = editAction.orig;
    let { x1, y1, x2, y2 } = o;
    if (editAction.corner === 'nw') { x1 = o.x1 + dx; y1 = o.y1 + dy; }
    else if (editAction.corner === 'ne') { x2 = o.x2 + dx; y1 = o.y1 + dy; }
    else if (editAction.corner === 'sw') { x1 = o.x1 + dx; y2 = o.y2 + dy; }
    else if (editAction.corner === 'se') { x2 = o.x2 + dx; y2 = o.y2 + dy; }

    x1 = Math.max(0, x1); y1 = Math.max(0, y1);
    x2 = Math.min(maxW, x2); y2 = Math.min(maxH, y2);
    const MIN = 6;
    if (x2 - x1 < MIN) { if (editAction.corner === 'nw' || editAction.corner === 'sw') x1 = x2 - MIN; else x2 = x1 + MIN; }
    if (y2 - y1 < MIN) { if (editAction.corner === 'nw' || editAction.corner === 'ne') y1 = y2 - MIN; else y2 = y1 + MIN; }

    s.x1 = x1; s.y1 = y1; s.x2 = x2; s.y2 = y2;
    updateRectEl(editAction.idx);
  }
}

function handleEditPointerUp(e) {
  if (!editAction) return;
  window.removeEventListener('pointermove', handleEditPointerMove);
  window.removeEventListener('pointerup', handleEditPointerUp);
  window.removeEventListener('pointercancel', handleEditPointerUp);

  if (editAction.type === 'draw') {
    const f = editAction.final;
    editAction.previewEl.remove();
    if (f && (f.x2 - f.x1) >= MIN_BOX_PAGE_PX && (f.y2 - f.y1) >= MIN_BOX_PAGE_PX) {
      const tempId = `tmp-${Date.now()}-${tempIdCounter++}`;
      const direction = (f.y2 - f.y1) > (f.x2 - f.x1) * 1.5 ? 'v' : 'h';
      sentences.push({
        id: null, tempId,
        x1: Math.round(f.x1), y1: Math.round(f.y1), x2: Math.round(f.x2), y2: Math.round(f.y2),
        direction, ocr_text: null, user_text: null, pending: true,
      });
      const idx = sentences.length - 1;
      selectRegion(idx);
      syncSentence(idx);
    }
  } else if (editAction.type === 'move' || editAction.type === 'resize') {
    const s = sentences[editAction.idx];
    s.x1 = Math.round(s.x1); s.y1 = Math.round(s.y1); s.x2 = Math.round(s.x2); s.y2 = Math.round(s.y2);
    updateRectEl(editAction.idx);
    if (didDrag) syncSentence(editAction.idx);
  }
  editAction = null;
  const p = clientToSvg(e.clientX, e.clientY);
  imageContainerEl.style.cursor = cursorForHit(hitTest(p.x, p.y));
}

// ── Region selection ───────────────────────────────────────────────────────────

function selectRegion(idx) {
  activeIdx = idx;
  const s = sentences[idx];

  regionCtrEl.textContent = `${idx + 1} / ${sentences.length}`;
  renderBoxes();

  regionInfoEl.style.display = 'flex';
  hwEmptyEl.style.display = 'none';
  ocrLabelEl.textContent = s.pending ? 'OCR (awaiting sync)' : 'OCR (auto-detected)';
  ocrTextEl.textContent = s.ocr_text ?? '—';
  userTextEl.value = s.user_text ?? '';
  directionToggleEl.textContent = s.direction === 'v' ? '↕ v' : '↔ h';
  saveStatEl.textContent = '';
  clearCanvas();
  hwStatEl.textContent = 'Draw a character';
}

prevRegBtnEl.addEventListener('click', () => { if (activeIdx > 0) selectRegion(activeIdx - 1); });
nextRegBtnEl.addEventListener('click', () => { if (activeIdx < sentences.length - 1) selectRegion(activeIdx + 1); });

// ── Save region text ───────────────────────────────────────────────────────────

let saveTimer = null;

function saveRegion() {
  if (activeIdx === null) return;
  sentences[activeIdx].user_text = userTextEl.value;
  syncSentence(activeIdx);
  renderBoxes();
  saveStatEl.textContent = navigator.onLine ? 'Saved ✓' : 'Saved (offline) ⏳';
  setTimeout(() => { saveStatEl.textContent = ''; }, 2000);
}

saveBtnEl.addEventListener('click', saveRegion);

deleteBtnEl.addEventListener('click', () => {
  if (activeIdx === null) return;
  if (!confirm('Delete this bounding box? This cannot be undone.')) return;
  const idx = activeIdx;
  activeIdx = null;
  deleteSentence(idx);
  regionInfoEl.style.display = 'none';
  hwEmptyEl.style.display = 'block';
  regionCtrEl.textContent = sentences.length ? `— / ${sentences.length}` : '—';
  clearCanvas();
  hwStatEl.textContent = 'Select a region';
  renderBoxes();
});

directionToggleEl.addEventListener('click', () => {
  if (activeIdx === null) return;
  const s = sentences[activeIdx];
  s.direction = s.direction === 'v' ? 'h' : 'v';
  directionToggleEl.textContent = s.direction === 'v' ? '↕ v' : '↔ h';
  renderBoxes();
  syncSentence(activeIdx);
});
userTextEl.addEventListener('input', () => {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveRegion, 1200);
});
undoBtnEl.addEventListener('click', () => {
  if (!userTextEl.value.length) return;
  userTextEl.value = userTextEl.value.slice(0, -1);
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveRegion, 800);
});

// ── Handwriting ────────────────────────────────────────────────────────────────

let strokes = [], currentStroke = [], drawing = false, recogTimer = null;

function getPos(e) {
  const r = hwCanvasEl.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return {
    x: (src.clientX - r.left) * (hwCanvasEl.width / r.width),
    y: (src.clientY - r.top)  * (hwCanvasEl.height / r.height),
  };
}

hwCanvasEl.addEventListener('pointerdown', e => {
  if (activeIdx === null) return;
  e.preventDefault(); drawing = true; currentStroke = [];
  const pt = getPos(e); currentStroke.push(pt);
  hwCtx.beginPath(); hwCtx.moveTo(pt.x, pt.y);
  clearTimeout(recogTimer); hwStatEl.textContent = 'Drawing…';
});
hwCanvasEl.addEventListener('pointermove', e => {
  if (!drawing) return; e.preventDefault();
  const pt = getPos(e); currentStroke.push(pt);
  hwCtx.lineTo(pt.x, pt.y); hwCtx.stroke();
  hwCtx.beginPath(); hwCtx.moveTo(pt.x, pt.y);
});
hwCanvasEl.addEventListener('pointerup', e => {
  if (!drawing) return; drawing = false;
  if (currentStroke.length >= 2) {
    strokes.push(currentStroke);
    strokeCntEl.textContent = `${strokes.length} stroke${strokes.length !== 1 ? 's' : ''}`;
  }
  currentStroke = [];
  clearTimeout(recogTimer); recogTimer = setTimeout(runRecognition, 700);
});
hwCanvasEl.addEventListener('pointerleave', e => {
  if (drawing) hwCanvasEl.dispatchEvent(new PointerEvent('pointerup', e));
});
hwCanvasEl.addEventListener('touchstart', e => e.preventDefault(), { passive: false });
hwCanvasEl.addEventListener('touchmove',  e => e.preventDefault(), { passive: false });

function runRecognition() {
  if (!strokes.length || !kwDb) return;
  hwStatEl.textContent = 'Recognizing…';
  const candidates = recognize(strokes, kwDb, 12);
  candidatesEl.innerHTML = '';
  candidates.forEach(c => {
    const el = document.createElement('div');
    el.className = 'candidate';
    el.innerHTML = `<span class="candidate-char">${c.char}</span><span class="candidate-score">${c.score.toFixed(1)}</span>`;
    el.addEventListener('click', () => confirmChar(c.char, el));
    candidatesEl.appendChild(el);
  });
  hwStatEl.textContent = `${candidates.length} candidates`;
}

function confirmChar(char, el) {
  document.querySelectorAll('.candidate').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  userTextEl.value += char;
  clearTimeout(saveTimer); saveTimer = setTimeout(saveRegion, 600);
  setTimeout(clearCanvas, 250);
}

clearBtnEl.addEventListener('click', clearCanvas);
function clearCanvas() {
  hwCtx.clearRect(0, 0, hwCanvasEl.width, hwCanvasEl.height);
  strokes = []; currentStroke = [];
  clearTimeout(recogTimer); candidatesEl.innerHTML = '';
  hwStatEl.textContent = activeIdx !== null ? 'Draw a character' : 'Select a region';
  strokeCntEl.textContent = '0 strokes';
}

// ── Init ───────────────────────────────────────────────────────────────────────

await loadReader();
</script>
</body>
</html>
