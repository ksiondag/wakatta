<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wakatta — Library</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: #1a1a2e;
  color: #e0e0e0;
  font-family: sans-serif;
  font-size: 14px;
}

.layout {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* ── Navbar ── */
.navbar {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 8px 16px;
  background: #12122a;
  border-bottom: 1px solid #333;
}
.navbar a { color: #888; text-decoration: none; font-size: 0.9rem; }
.navbar a:hover { color: #bbb; }
.navbar .current { color: #aaa; font-size: 0.9rem; font-weight: 600; }
.navbar-sep { color: #444; }

button {
  padding: 6px 16px;
  border: 1px solid #555;
  border-radius: 5px;
  background: #2a2a3e;
  color: #ddd;
  cursor: pointer;
  font-size: 0.9rem;
  white-space: nowrap;
}
button:hover { background: #3a3a5e; }
button:disabled { opacity: 0.4; cursor: default; }

input[type="text"], input[type="number"] {
  padding: 6px 10px;
  background: #0d0d1a;
  border: 1px solid #444;
  border-radius: 5px;
  color: #ddd;
  font-size: 0.9rem;
}
input:focus { outline: none; border-color: #7070cc; }

/* ══════════════════════════════════════════
   LIBRARY VIEW
══════════════════════════════════════════ */

#library-view {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.add-work-bar {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 20px;
  background: #16162e;
  border-bottom: 1px solid #2a2a44;
}

.add-work-bar label { color: #888; white-space: nowrap; }
#pdf-path { flex: 1; min-width: 200px; }
#add-status { font-size: 0.82rem; color: #888; }

#works-list {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

#works-empty {
  color: #555;
  text-align: center;
  margin-top: 60px;
  font-size: 0.95rem;
  line-height: 1.8;
}

.work-card {
  background: #16162e;
  border: 1px solid #2a2a44;
  border-radius: 8px;
  padding: 14px 18px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.work-card-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
}

.work-title { font-size: 1rem; color: #ddd; }
.work-path  { font-size: 0.75rem; color: #555; margin-top: 2px; word-break: break-all; }

.work-actions { display: flex; gap: 8px; flex-shrink: 0; }
.work-actions button { padding: 5px 12px; font-size: 0.85rem; }
.btn-read { border-color: #4a6a4a; background: #1e3a1e; color: #80c880; }
.btn-read:hover { background: #2a4a2a; }

.work-status { font-size: 0.82rem; color: #888; }
.work-status.done    { color: #60b860; }
.work-status.failed  { color: #c06060; }
.work-status.running { color: #8888cc; }

.progress-bar-wrap {
  height: 4px;
  background: #2a2a44;
  border-radius: 2px;
  overflow: hidden;
}
.progress-bar {
  height: 100%;
  background: #6060cc;
  border-radius: 2px;
  transition: width 0.4s ease;
}
</style>
</head>
<body>
<div class="layout">

  <nav class="navbar">
    <a href="/">Handwriting</a>
    <span class="navbar-sep">·</span>
    <span class="current">Library</span>
  </nav>

  <div id="library-view">
    <div class="add-work-bar">
      <input id="pdf-file" type="file" accept=".pdf" style="display:none">
      <button id="browse-btn">Browse PDF…</button>
      <span id="selected-filename" style="color:#888;font-size:0.85rem">No file selected</span>
      <span id="add-status"></span>
    </div>
    <div id="works-list">
      <div id="works-empty">No works yet.<br>Enter a PDF path above to get started.</div>
    </div>
  </div>

</div>
<script type="module">

// ── State ──────────────────────────────────────────────────────────────────────

let workList  = [];          // [{id, title, path}]
let workPages = {};          // { workId: [{id, page_num, width, height}] }
let workJobs  = {};          // { workId: jobObj }
let pollTimers= {};          // { workId: timerId }

// ── Element refs ───────────────────────────────────────────────────────────────

const pdfFileEl       = document.getElementById('pdf-file');
const browseBtnEl     = document.getElementById('browse-btn');
const selectedFilenameEl = document.getElementById('selected-filename');
const addStatusEl     = document.getElementById('add-status');
const worksListEl    = document.getElementById('works-list');
const worksEmptyEl   = document.getElementById('works-empty');

// ── Notification permission ────────────────────────────────────────────────────

if ('Notification' in window && Notification.permission === 'default') {
  Notification.requestPermission();
}

function notify(title, body) {
  if ('Notification' in window && Notification.permission === 'granted') {
    new Notification(title, { body, icon: '/static/icon.svg' });
  }
}

// ── Library — load & render ────────────────────────────────────────────────────

async function loadLibrary() {
  const res = await fetch('/api/works');
  workList = await res.json();
  await Promise.all(workList.map(async w => {
    await fetchPages(w.id);
    await fetchJob(w.id);
  }));
  renderLibrary();
}

async function fetchJob(workId) {
  try {
    const res = await fetch(`/api/works/${workId}/job`);
    if (res.status === 404) return;
    if (!res.ok) return;
    const job = await res.json();
    workJobs[workId] = job;
    if (job.status === 'pending' || job.status === 'running') {
      schedulePoll(workId, job.id);
    }
  } catch (e) {
    console.error('fetchJob', e);
  }
}

async function fetchPages(workId) {
  const res = await fetch(`/api/works/${workId}/pages`);
  workPages[workId] = await res.json();
}

function workStatus(workId) {
  const job   = workJobs[workId];
  const pages = workPages[workId] ?? [];

  if (job) {
    if (job.status === 'pending' || job.status === 'running') {
      const frac = job.pages_total > 0 ? job.pages_done / job.pages_total : 0;
      const label = job.pages_total > 0
        ? `Processing ${job.pages_done} / ${job.pages_total} pages`
        : 'Starting…';
      return { label, cls: 'running', ready: pages.length > 0, progress: frac, canRetrigger: false };
    }
    if (job.status === 'failed') {
      return { label: `Failed after ${pages.length} pages`, cls: 'failed', ready: pages.length > 0, progress: 0, canRetrigger: true };
    }
    if (job.status === 'done') {
      return { label: `Ready — ${pages.length} pages`, cls: 'done', ready: true, progress: 1, canRetrigger: false };
    }
  }

  if (pages.length > 0) {
    return { label: `${pages.length} pages (may be incomplete)`, cls: '', ready: true, progress: 0, canRetrigger: true };
  }
  return { label: 'Not processed', cls: '', ready: false, progress: 0, canRetrigger: true };
}

function renderLibrary() {
  worksEmptyEl.style.display = workList.length ? 'none' : 'block';

  // Remove old cards (keep the empty placeholder)
  worksListEl.querySelectorAll('.work-card').forEach(el => el.remove());

  for (const work of workList) {
    const st = workStatus(work.id);
    const card = document.createElement('div');
    card.className = 'work-card';
    card.dataset.workId = work.id;

    const progressBarHtml = (st.cls === 'running' || st.progress > 0) ? `
      <div class="progress-bar-wrap">
        <div class="progress-bar" style="width:${Math.round(st.progress * 100)}%"></div>
      </div>` : '';

    card.innerHTML = `
      <div class="work-card-header">
        <div>
          <div class="work-title">${escHtml(work.title)}</div>
          <div class="work-path">${escHtml(work.path)}</div>
        </div>
        <div class="work-actions">
          ${st.ready ? `<button class="btn-read" data-action="read" data-id="${work.id}">Read</button>` : ''}
          ${st.canRetrigger ? `<button data-action="process" data-id="${work.id}">↺ Process</button>` : ''}
        </div>
      </div>
      <div class="work-status ${st.cls}">${escHtml(st.label)}</div>
      ${progressBarHtml}
    `;

    worksListEl.appendChild(card);
  }
}

function updateWorkCard(workId) {
  const card = worksListEl.querySelector(`.work-card[data-work-id="${workId}"]`);
  if (!card) return;
  const st = workStatus(workId);

  card.querySelector('.work-status').className = `work-status ${st.cls}`;
  card.querySelector('.work-status').textContent = st.label;

  let pb = card.querySelector('.progress-bar-wrap');
  if (st.cls === 'running' || st.progress > 0) {
    if (!pb) {
      pb = document.createElement('div');
      pb.className = 'progress-bar-wrap';
      pb.innerHTML = '<div class="progress-bar"></div>';
      card.appendChild(pb);
    }
    pb.querySelector('.progress-bar').style.width = `${Math.round(st.progress * 100)}%`;
  } else if (pb) {
    pb.remove();
  }

  const actions = card.querySelector('.work-actions');
  actions.innerHTML =
    (st.ready ? `<button class="btn-read" data-action="read" data-id="${workId}">Read</button>` : '') +
    (st.canRetrigger ? `<button data-action="process" data-id="${workId}">↺ Process</button>` : '');
}

worksListEl.addEventListener('click', e => {
  const btn = e.target.closest('button[data-action]');
  if (!btn) return;
  const id = parseInt(btn.dataset.id, 10);
  if (btn.dataset.action === 'read') location.href = `/read/${id}`;
  if (btn.dataset.action === 'process') startJob(id);
});

// ── Add work ───────────────────────────────────────────────────────────────────

browseBtnEl.addEventListener('click', () => pdfFileEl.click());

pdfFileEl.addEventListener('change', async () => {
  const file = pdfFileEl.files[0];
  if (!file) return;

  selectedFilenameEl.textContent = file.name;
  addStatusEl.textContent = 'Uploading…';
  browseBtnEl.disabled = true;

  try {
    const form = new FormData();
    form.append('file', file);
    const res = await fetch('/api/upload', { method: 'POST', body: form });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      addStatusEl.textContent = `Error: ${err.detail ?? res.status}`;
      return;
    }
    const { work, job } = await res.json();

    if (!workList.find(w => w.id === work.id)) {
      workList.push(work);
      workPages[work.id] = [];
    }
    workJobs[work.id] = job;
    renderLibrary();
    addStatusEl.textContent = '';
    selectedFilenameEl.textContent = 'No file selected';
    pdfFileEl.value = '';

    if (job.status === 'pending' || job.status === 'running') {
      schedulePoll(work.id, job.id);
    }
  } catch (err) {
    addStatusEl.textContent = `Error: ${err.message}`;
    console.error(err);
  } finally {
    browseBtnEl.disabled = false;
  }
});

// ── Start / poll job ───────────────────────────────────────────────────────────

async function startJob(workId) {
  const res = await fetch(`/api/works/${workId}/process-all`, { method: 'POST' });
  if (!res.ok) { console.error('Job start failed', res.status); return; }
  const job = await res.json();
  workJobs[workId] = job;
  updateWorkCard(workId);
  schedulePoll(workId, job.id);
}

function schedulePoll(workId, jobId) {
  clearTimeout(pollTimers[workId]);
  pollTimers[workId] = setTimeout(() => pollJob(workId, jobId), 2000);
}

async function pollJob(workId, jobId) {
  try {
    const res = await fetch(`/api/jobs/${jobId}`);
    if (!res.ok) return;
    const job = await res.json();
    workJobs[workId] = job;
    updateWorkCard(workId);

    if (job.status === 'running' || job.status === 'pending') {
      await fetchPages(workId);
      updateWorkCard(workId);
      schedulePoll(workId, jobId);
      return;
    }
    // Final state — refresh pages from server
    await fetchPages(workId);
    updateWorkCard(workId);

    if (job.status === 'done') {
      const work = workList.find(w => w.id === workId);
      notify('わかった', `"${work?.title}" is ready to read`);
    }
  } catch (err) {
    console.error('Poll error', err);
  }
}

// ── Util ───────────────────────────────────────────────────────────────────────

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Init ───────────────────────────────────────────────────────────────────────

await loadLibrary();
</script>
</body>
</html>
