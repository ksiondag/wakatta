<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wakatta — Page Reader</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: #1a1a2e;
  color: #e0e0e0;
  font-family: sans-serif;
  font-size: 14px;
}

.layout {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* ── Navbar ── */
.navbar {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 8px 16px;
  background: #12122a;
  border-bottom: 1px solid #333;
}
.navbar a { color: #888; text-decoration: none; font-size: 0.9rem; }
.navbar a:hover { color: #bbb; }
.navbar .current { color: #aaa; font-size: 0.9rem; font-weight: 600; }
.navbar-sep { color: #444; }

button {
  padding: 6px 16px;
  border: 1px solid #555;
  border-radius: 5px;
  background: #2a2a3e;
  color: #ddd;
  cursor: pointer;
  font-size: 0.9rem;
  white-space: nowrap;
}
button:hover { background: #3a3a5e; }
button:disabled { opacity: 0.4; cursor: default; }

input[type="text"], input[type="number"] {
  padding: 6px 10px;
  background: #0d0d1a;
  border: 1px solid #444;
  border-radius: 5px;
  color: #ddd;
  font-size: 0.9rem;
}
input:focus { outline: none; border-color: #7070cc; }

/* ══════════════════════════════════════════
   LIBRARY VIEW
══════════════════════════════════════════ */

#library-view {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.add-work-bar {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 20px;
  background: #16162e;
  border-bottom: 1px solid #2a2a44;
}

.add-work-bar label { color: #888; white-space: nowrap; }
#pdf-path { flex: 1; min-width: 200px; }
#add-status { font-size: 0.82rem; color: #888; }

#works-list {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

#works-empty {
  color: #555;
  text-align: center;
  margin-top: 60px;
  font-size: 0.95rem;
  line-height: 1.8;
}

.work-card {
  background: #16162e;
  border: 1px solid #2a2a44;
  border-radius: 8px;
  padding: 14px 18px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.work-card-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
}

.work-title { font-size: 1rem; color: #ddd; }
.work-path  { font-size: 0.75rem; color: #555; margin-top: 2px; word-break: break-all; }

.work-actions { display: flex; gap: 8px; flex-shrink: 0; }
.work-actions button { padding: 5px 12px; font-size: 0.85rem; }
.btn-read { border-color: #4a6a4a; background: #1e3a1e; color: #80c880; }
.btn-read:hover { background: #2a4a2a; }

.work-status { font-size: 0.82rem; color: #888; }
.work-status.done    { color: #60b860; }
.work-status.failed  { color: #c06060; }
.work-status.running { color: #8888cc; }

.progress-bar-wrap {
  height: 4px;
  background: #2a2a44;
  border-radius: 2px;
  overflow: hidden;
}
.progress-bar {
  height: 100%;
  background: #6060cc;
  border-radius: 2px;
  transition: width 0.4s ease;
}


/* ══════════════════════════════════════════
   READER VIEW
══════════════════════════════════════════ */

#reader-view {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.reader-header {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 8px 14px;
  background: #12122a;
  border-bottom: 1px solid #2a2a44;
}

#back-btn { padding: 5px 12px; font-size: 0.85rem; }
#reader-work-title { flex: 1; font-size: 0.95rem; color: #aaa; }

.page-nav {
  display: flex;
  align-items: center;
  gap: 10px;
}
.page-nav button { padding: 4px 12px; font-size: 0.9rem; }
#page-counter { font-size: 0.85rem; color: #888; min-width: 80px; text-align: center; }

.reader-main {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* ── Image panel ── */
.image-panel {
  flex: 1;
  overflow: auto;
  padding: 16px;
  display: flex;
  align-items: flex-start;
  justify-content: center;
}

#image-container {
  position: relative;
  display: inline-block;
  line-height: 0;
}

#page-img { display: block; max-width: 100%; height: auto; }

#bbox-svg {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  cursor: pointer;
}
#bbox-svg rect { transition: fill 0.1s, stroke-width 0.1s; }

/* ── Handwriting panel ── */
.hw-panel {
  width: 360px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  border-left: 1px solid #2a2a44;
  background: #161628;
  overflow-y: auto;
}

.region-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 14px;
  border-bottom: 1px solid #2a2a44;
  background: #12122a;
}
#region-counter { font-size: 0.85rem; color: #888; }
.region-nav button { padding: 4px 10px; font-size: 0.8rem; }

.region-info {
  padding: 12px 14px;
  border-bottom: 1px solid #2a2a44;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.region-info .label {
  font-size: 0.75rem; color: #666;
  text-transform: uppercase; letter-spacing: 0.05em;
}
#ocr-text { font-size: 1.1rem; color: #777; min-height: 1.4em; letter-spacing: 0.08em; word-break: break-all; }

.user-text-row { display: flex; gap: 6px; align-items: center; }
#user-text {
  flex: 1; padding: 6px 8px;
  background: #0d0d1a; border: 1px solid #555; border-radius: 5px;
  color: #e8e8ff; font-size: 1.2rem; letter-spacing: 0.1em;
}
#user-text:focus { outline: none; border-color: #7070cc; }
#undo-char { padding: 6px 10px; font-size: 1rem; }

.save-row { display: flex; align-items: center; gap: 8px; }
#save-status { font-size: 0.78rem; color: #666; }

.canvas-section {
  padding: 14px;
  border-bottom: 1px solid #2a2a44;
  display: flex; flex-direction: column; align-items: center; gap: 8px;
}
#canvas-wrap { border: 2px solid #333; border-radius: 6px; overflow: hidden; }
#hw-canvas {
  display: block; background: #0d0d1a;
  cursor: crosshair; touch-action: none;
}
.hw-controls { display: flex; gap: 10px; align-items: center; width: 100%; }
#hw-status   { font-size: 0.8rem; color: #888; flex: 1; }
#stroke-count{ font-size: 0.8rem; color: #aaa; }

#candidates { padding: 10px 14px; display: flex; flex-wrap: wrap; gap: 8px; }

.candidate {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding: 8px 10px; border: 1px solid #444; border-radius: 6px;
  background: #2a2a3e; cursor: pointer; min-width: 50px;
  transition: background 0.1s, border-color 0.1s;
}
.candidate:hover { background: #3e3e60; border-color: #7070cc; }
.candidate.selected { background: #3a3a7a; border-color: #8888ff; }
.candidate-char  { font-size: 2rem; line-height: 1; }
.candidate-score { font-size: 0.6rem; color: #666; }

#hw-empty { padding: 24px 14px; color: #555; text-align: center; font-size: 0.9rem; line-height: 1.6; }

@media (max-width: 700px) {
  .reader-main { flex-direction: column; }
  .hw-panel { width: 100%; border-left: none; border-top: 1px solid #2a2a44; }
}
</style>
</head>
<body>
<div class="layout">

  <nav class="navbar">
    <a href="/">Handwriting</a>
    <span class="navbar-sep">·</span>
    <span class="current">Page Reader</span>
  </nav>

  <!-- ── Library view ── -->
  <div id="library-view">
    <div class="add-work-bar">
      <input id="pdf-file" type="file" accept=".pdf" style="display:none">
      <button id="browse-btn">Browse PDF…</button>
      <span id="selected-filename" style="color:#888;font-size:0.85rem">No file selected</span>
      <span id="add-status"></span>
    </div>
    <div id="works-list">
      <div id="works-empty">No works yet.<br>Enter a PDF path above to get started.</div>
    </div>
  </div>

  <!-- ── Reader view (hidden until a work is opened) ── -->
  <div id="reader-view" hidden>

    <div class="reader-header">
      <button id="back-btn">← Library</button>
      <span id="reader-work-title"></span>
      <div class="page-nav">
        <button id="prev-page">◀</button>
        <span id="page-counter">—</span>
        <button id="next-page">▶</button>
      </div>
    </div>

    <div class="reader-main">

      <div class="image-panel">
        <div id="image-container">
          <img id="page-img" alt="manga page">
          <svg id="bbox-svg" xmlns="http://www.w3.org/2000/svg"></svg>
        </div>
      </div>

      <div class="hw-panel">

        <div class="region-nav" id="region-nav">
          <button id="prev-region">◀</button>
          <span id="region-counter">—</span>
          <button id="next-region">▶</button>
        </div>

        <div class="region-info" id="region-info" style="display:none">
          <div class="label">OCR (auto-detected)</div>
          <div id="ocr-text">—</div>
          <div class="label">Your text</div>
          <div class="user-text-row">
            <input id="user-text" type="text" placeholder="Confirm characters below…">
            <button id="undo-char" title="Remove last character">⌫</button>
          </div>
          <div class="save-row">
            <button id="save-btn">Save</button>
            <span id="save-status"></span>
          </div>
        </div>

        <div class="canvas-section">
          <div id="canvas-wrap">
            <canvas id="hw-canvas" width="320" height="320"></canvas>
          </div>
          <div class="hw-controls">
            <button id="clear-btn">Clear</button>
            <span id="stroke-count">0 strokes</span>
            <span id="hw-status">Select a region</span>
          </div>
        </div>

        <div id="candidates"></div>
        <div id="hw-empty">← Select a bounding box to start transcribing</div>

      </div>
    </div>
  </div>

</div>
<script type="module">
import { loadDb, recognize } from '/static/recognizer.js';

// ── KanjiVG db ─────────────────────────────────────────────────────────────────

let kwDb = null;
try { kwDb = await loadDb('/static/db.json'); } catch (e) { console.error(e); }

const hwCtx = document.getElementById('hw-canvas').getContext('2d');
hwCtx.strokeStyle = '#e8e8ff';
hwCtx.lineWidth = 3;
hwCtx.lineCap = 'round';
hwCtx.lineJoin = 'round';

// ── State ──────────────────────────────────────────────────────────────────────

let workList  = [];          // [{id, title, path}]
let workPages = {};          // { workId: [{id, page_num, width, height}] }
let workJobs  = {};          // { workId: jobObj }
let pollTimers= {};          // { workId: timerId }

let currentWork  = null;
let currentPages = [];
let currentPageIdx = 0;
let pageData     = null;     // full /api/pages/{id} response
let sentences    = [];
let activeIdx    = null;

// ── Element refs ───────────────────────────────────────────────────────────────

const libraryViewEl  = document.getElementById('library-view');
const readerViewEl   = document.getElementById('reader-view');
const pdfFileEl       = document.getElementById('pdf-file');
const browseBtnEl     = document.getElementById('browse-btn');
const selectedFilenameEl = document.getElementById('selected-filename');
const addStatusEl     = document.getElementById('add-status');
const worksListEl    = document.getElementById('works-list');
const worksEmptyEl   = document.getElementById('works-empty');

const backBtnEl      = document.getElementById('back-btn');
const readerTitleEl  = document.getElementById('reader-work-title');
const prevPageBtnEl  = document.getElementById('prev-page');
const nextPageBtnEl  = document.getElementById('next-page');
const pageCounterEl  = document.getElementById('page-counter');

const pageImgEl      = document.getElementById('page-img');
const bboxSvgEl      = document.getElementById('bbox-svg');

const regionNavEl    = document.getElementById('region-nav');
const regionCtrEl    = document.getElementById('region-counter');
const prevRegBtnEl   = document.getElementById('prev-region');
const nextRegBtnEl   = document.getElementById('next-region');
const regionInfoEl   = document.getElementById('region-info');
const ocrTextEl      = document.getElementById('ocr-text');
const userTextEl     = document.getElementById('user-text');
const undoBtnEl      = document.getElementById('undo-char');
const saveBtnEl      = document.getElementById('save-btn');
const saveStatEl     = document.getElementById('save-status');
const hwCanvasEl     = document.getElementById('hw-canvas');
const candidatesEl   = document.getElementById('candidates');
const clearBtnEl     = document.getElementById('clear-btn');
const strokeCntEl    = document.getElementById('stroke-count');
const hwStatEl       = document.getElementById('hw-status');
const hwEmptyEl      = document.getElementById('hw-empty');

// ── Notification permission ────────────────────────────────────────────────────

if ('Notification' in window && Notification.permission === 'default') {
  Notification.requestPermission();
}

function notify(title, body) {
  if ('Notification' in window && Notification.permission === 'granted') {
    new Notification(title, { body, icon: '/static/icon.svg' });
  }
}

// ── Library — load & render ────────────────────────────────────────────────────

async function loadLibrary() {
  const res = await fetch('/api/works');
  workList = await res.json();
  await Promise.all(workList.map(async w => {
    await fetchPages(w.id);
    await fetchJob(w.id);
  }));
  renderLibrary();
}

async function fetchJob(workId) {
  try {
    const res = await fetch(`/api/works/${workId}/job`);
    if (res.status === 404) return;
    if (!res.ok) return;
    const job = await res.json();
    workJobs[workId] = job;
    if (job.status === 'pending' || job.status === 'running') {
      schedulePoll(workId, job.id);
    }
  } catch (e) {
    console.error('fetchJob', e);
  }
}

async function fetchPages(workId) {
  const res = await fetch(`/api/works/${workId}/pages`);
  workPages[workId] = await res.json();
}

function workStatus(workId) {
  const job   = workJobs[workId];
  const pages = workPages[workId] ?? [];

  if (job) {
    if (job.status === 'pending' || job.status === 'running') {
      const frac = job.pages_total > 0 ? job.pages_done / job.pages_total : 0;
      const label = job.pages_total > 0
        ? `Processing ${job.pages_done} / ${job.pages_total} pages`
        : 'Starting…';
      return { label, cls: 'running', ready: pages.length > 0, progress: frac, canRetrigger: false };
    }
    if (job.status === 'failed') {
      return { label: `Failed after ${pages.length} pages`, cls: 'failed', ready: pages.length > 0, progress: 0, canRetrigger: true };
    }
    if (job.status === 'done') {
      return { label: `Ready — ${pages.length} pages`, cls: 'done', ready: true, progress: 1, canRetrigger: false };
    }
  }

  if (pages.length > 0) {
    return { label: `${pages.length} pages (may be incomplete)`, cls: '', ready: true, progress: 0, canRetrigger: true };
  }
  return { label: 'Not processed', cls: '', ready: false, progress: 0, canRetrigger: true };
}

function renderLibrary() {
  worksEmptyEl.style.display = workList.length ? 'none' : 'block';

  // Remove old cards (keep the empty placeholder)
  worksListEl.querySelectorAll('.work-card').forEach(el => el.remove());

  for (const work of workList) {
    const st = workStatus(work.id);
    const card = document.createElement('div');
    card.className = 'work-card';
    card.dataset.workId = work.id;

    const progressBarHtml = (st.cls === 'running' || st.progress > 0) ? `
      <div class="progress-bar-wrap">
        <div class="progress-bar" style="width:${Math.round(st.progress * 100)}%"></div>
      </div>` : '';

    card.innerHTML = `
      <div class="work-card-header">
        <div>
          <div class="work-title">${escHtml(work.title)}</div>
          <div class="work-path">${escHtml(work.path)}</div>
        </div>
        <div class="work-actions">
          ${st.ready ? `<button class="btn-read" data-action="read" data-id="${work.id}">Read</button>` : ''}
          ${st.canRetrigger ? `<button data-action="process" data-id="${work.id}">↺ Process</button>` : ''}
        </div>
      </div>
      <div class="work-status ${st.cls}">${escHtml(st.label)}</div>
      ${progressBarHtml}
    `;

    worksListEl.appendChild(card);
  }
}

function updateWorkCard(workId) {
  const card = worksListEl.querySelector(`.work-card[data-work-id="${workId}"]`);
  if (!card) return;
  const st = workStatus(workId);
  const work = workList.find(w => w.id === workId);

  card.querySelector('.work-status').className = `work-status ${st.cls}`;
  card.querySelector('.work-status').textContent = st.label;

  let pb = card.querySelector('.progress-bar-wrap');
  if (st.cls === 'running' || st.progress > 0) {
    if (!pb) {
      pb = document.createElement('div');
      pb.className = 'progress-bar-wrap';
      pb.innerHTML = '<div class="progress-bar"></div>';
      card.appendChild(pb);
    }
    pb.querySelector('.progress-bar').style.width = `${Math.round(st.progress * 100)}%`;
  } else if (pb) {
    pb.remove();
  }

  const actions = card.querySelector('.work-actions');
  actions.innerHTML =
    (st.ready ? `<button class="btn-read" data-action="read" data-id="${workId}">Read</button>` : '') +
    (st.canRetrigger ? `<button data-action="process" data-id="${workId}">↺ Process</button>` : '');
}

worksListEl.addEventListener('click', e => {
  const btn = e.target.closest('button[data-action]');
  if (!btn) return;
  const id = parseInt(btn.dataset.id, 10);
  if (btn.dataset.action === 'read') openReader(id);
  if (btn.dataset.action === 'process') startJob(id);
});

// ── Add work ───────────────────────────────────────────────────────────────────

browseBtnEl.addEventListener('click', () => pdfFileEl.click());

pdfFileEl.addEventListener('change', async () => {
  const file = pdfFileEl.files[0];
  if (!file) return;

  selectedFilenameEl.textContent = file.name;
  addStatusEl.textContent = 'Uploading…';
  browseBtnEl.disabled = true;

  try {
    const form = new FormData();
    form.append('file', file);
    const res = await fetch('/api/upload', { method: 'POST', body: form });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      addStatusEl.textContent = `Error: ${err.detail ?? res.status}`;
      return;
    }
    const { work, job } = await res.json();

    if (!workList.find(w => w.id === work.id)) {
      workList.push(work);
      workPages[work.id] = [];
    }
    workJobs[work.id] = job;
    renderLibrary();
    addStatusEl.textContent = '';
    selectedFilenameEl.textContent = 'No file selected';
    pdfFileEl.value = '';

    if (job.status === 'pending' || job.status === 'running') {
      schedulePoll(work.id, job.id);
    }
  } catch (err) {
    addStatusEl.textContent = `Error: ${err.message}`;
    console.error(err);
  } finally {
    browseBtnEl.disabled = false;
  }
});

// ── Start / poll job ───────────────────────────────────────────────────────────

async function startJob(workId) {
  const res = await fetch(`/api/works/${workId}/process-all`, { method: 'POST' });
  if (!res.ok) { console.error('Job start failed', res.status); return; }
  const job = await res.json();
  workJobs[workId] = job;
  updateWorkCard(workId);
  schedulePoll(workId, job.id);
}

function schedulePoll(workId, jobId) {
  clearTimeout(pollTimers[workId]);
  pollTimers[workId] = setTimeout(() => pollJob(workId, jobId), 2000);
}

async function pollJob(workId, jobId) {
  try {
    const res = await fetch(`/api/jobs/${jobId}`);
    if (!res.ok) return;
    const job = await res.json();
    workJobs[workId] = job;
    updateWorkCard(workId);

    if (job.status === 'running' || job.status === 'pending') {
      await fetchPages(workId);
      updateWorkCard(workId);
      schedulePoll(workId, jobId);
      return;
    }
    // Final state — refresh pages from server
    await fetchPages(workId);
    updateWorkCard(workId);

    if (job.status === 'done') {
      const work = workList.find(w => w.id === workId);
      notify('わかった', `"${work?.title}" is ready to read`);
    }
  } catch (err) {
    console.error('Poll error', err);
  }
}

// ── Open / close reader ────────────────────────────────────────────────────────

async function openReader(workId) {
  await fetchPages(workId);
  currentWork  = workList.find(w => w.id === workId);
  currentPages = workPages[workId] ?? [];
  if (!currentPages.length) return;

  readerTitleEl.textContent = currentWork.title;
  libraryViewEl.hidden = true;
  readerViewEl.hidden  = false;

  navigateTo(0);
}

backBtnEl.addEventListener('click', () => {
  readerViewEl.hidden  = true;
  libraryViewEl.hidden = false;
  currentWork = null;
  activeIdx   = null;
});

prevPageBtnEl.addEventListener('click', () => navigateTo(currentPageIdx - 1));
nextPageBtnEl.addEventListener('click', () => navigateTo(currentPageIdx + 1));

async function navigateTo(idx) {
  if (!currentPages.length) return;
  idx = Math.max(0, Math.min(idx, currentPages.length - 1));
  currentPageIdx = idx;

  prevPageBtnEl.disabled = idx === 0;
  nextPageBtnEl.disabled = idx === currentPages.length - 1;
  pageCounterEl.textContent = `Page ${idx + 1} / ${currentPages.length}`;

  const pageRecord = currentPages[idx];
  const res = await fetch(`/api/pages/${pageRecord.id}`);
  pageData  = await res.json();
  sentences = pageData.sentences;
  activeIdx = null;

  pageImgEl.src = `/api/pages/${pageRecord.id}/image`;
  bboxSvgEl.setAttribute('viewBox', `0 0 ${pageData.width} ${pageData.height}`);
  bboxSvgEl.innerHTML = '';

  sentences.forEach((s, i) => {
    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('x', s.x1);
    rect.setAttribute('y', s.y1);
    rect.setAttribute('width', s.x2 - s.x1);
    rect.setAttribute('height', s.y2 - s.y1);
    rect.setAttribute('rx', '2');
    rect.setAttribute('fill', s.user_text ? 'rgba(80,160,80,0.12)' : 'rgba(0,0,0,0.01)');
    rect.setAttribute('stroke', s.direction === 'v' ? '#00c864' : '#c87800');
    rect.setAttribute('stroke-width', '3');
    rect.dataset.idx = i;
    rect.addEventListener('click', () => selectRegion(i));
    bboxSvgEl.appendChild(rect);

    const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    label.setAttribute('x', s.x1 + 3);
    label.setAttribute('y', s.y1 - 4);
    label.setAttribute('font-size', '18');
    label.setAttribute('fill', s.direction === 'v' ? '#00c864' : '#c87800');
    label.setAttribute('font-family', 'sans-serif');
    label.setAttribute('pointer-events', 'none');
    label.textContent = i + 1;
    bboxSvgEl.appendChild(label);
  });

  regionInfoEl.style.display = 'none';
  hwEmptyEl.style.display = 'block';
  clearCanvas();
  hwStatEl.textContent = 'Select a region';
}

// ── Region selection ───────────────────────────────────────────────────────────

function selectRegion(idx) {
  activeIdx = idx;
  const s = sentences[idx];

  regionCtrEl.textContent = `${idx + 1} / ${sentences.length}`;

  bboxSvgEl.querySelectorAll('rect').forEach(r => {
    const ri = parseInt(r.dataset.idx, 10);
    const si = sentences[ri];
    if (ri === idx) {
      r.setAttribute('fill', 'rgba(100,100,255,0.18)');
      r.setAttribute('stroke', '#8888ff');
      r.setAttribute('stroke-width', '5');
    } else {
      r.setAttribute('fill', si.user_text ? 'rgba(80,160,80,0.12)' : 'rgba(0,0,0,0.01)');
      r.setAttribute('stroke', si.direction === 'v' ? '#00c864' : '#c87800');
      r.setAttribute('stroke-width', '3');
    }
  });

  regionInfoEl.style.display = 'flex';
  hwEmptyEl.style.display = 'none';
  ocrTextEl.textContent = s.ocr_text ?? '—';
  userTextEl.value = s.user_text ?? '';
  saveStatEl.textContent = '';
  clearCanvas();
  hwStatEl.textContent = 'Draw a character';
}

prevRegBtnEl.addEventListener('click', () => { if (activeIdx > 0) selectRegion(activeIdx - 1); });
nextRegBtnEl.addEventListener('click', () => { if (activeIdx < sentences.length - 1) selectRegion(activeIdx + 1); });

// ── Save region text ───────────────────────────────────────────────────────────

let saveTimer = null;

async function saveRegion() {
  if (activeIdx === null) return;
  const s = sentences[activeIdx];
  try {
    const res = await fetch(`/api/sentences/${s.id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_text: userTextEl.value }),
    });
    if (!res.ok) { saveStatEl.textContent = 'Save failed'; return; }
    const updated = await res.json();
    sentences[activeIdx].user_text = updated.user_text;
    saveStatEl.textContent = 'Saved ✓';
    const rect = bboxSvgEl.querySelector(`rect[data-idx="${activeIdx}"]`);
    if (rect && updated.user_text) rect.setAttribute('fill', 'rgba(80,160,80,0.12)');
    setTimeout(() => { saveStatEl.textContent = ''; }, 2000);
  } catch (err) {
    saveStatEl.textContent = 'Save failed';
  }
}

saveBtnEl.addEventListener('click', saveRegion);
userTextEl.addEventListener('input', () => {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveRegion, 1200);
});
undoBtnEl.addEventListener('click', () => {
  if (!userTextEl.value.length) return;
  userTextEl.value = userTextEl.value.slice(0, -1);
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveRegion, 800);
});

// ── Handwriting ────────────────────────────────────────────────────────────────

let strokes = [], currentStroke = [], drawing = false, recogTimer = null;

function getPos(e) {
  const r = hwCanvasEl.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return {
    x: (src.clientX - r.left) * (hwCanvasEl.width / r.width),
    y: (src.clientY - r.top)  * (hwCanvasEl.height / r.height),
  };
}

hwCanvasEl.addEventListener('pointerdown', e => {
  if (activeIdx === null) return;
  e.preventDefault(); drawing = true; currentStroke = [];
  const pt = getPos(e); currentStroke.push(pt);
  hwCtx.beginPath(); hwCtx.moveTo(pt.x, pt.y);
  clearTimeout(recogTimer); hwStatEl.textContent = 'Drawing…';
});
hwCanvasEl.addEventListener('pointermove', e => {
  if (!drawing) return; e.preventDefault();
  const pt = getPos(e); currentStroke.push(pt);
  hwCtx.lineTo(pt.x, pt.y); hwCtx.stroke();
  hwCtx.beginPath(); hwCtx.moveTo(pt.x, pt.y);
});
hwCanvasEl.addEventListener('pointerup', e => {
  if (!drawing) return; drawing = false;
  if (currentStroke.length >= 2) {
    strokes.push(currentStroke);
    strokeCntEl.textContent = `${strokes.length} stroke${strokes.length !== 1 ? 's' : ''}`;
  }
  currentStroke = [];
  clearTimeout(recogTimer); recogTimer = setTimeout(runRecognition, 700);
});
hwCanvasEl.addEventListener('pointerleave', e => {
  if (drawing) hwCanvasEl.dispatchEvent(new PointerEvent('pointerup', e));
});
hwCanvasEl.addEventListener('touchstart', e => e.preventDefault(), { passive: false });
hwCanvasEl.addEventListener('touchmove',  e => e.preventDefault(), { passive: false });

function runRecognition() {
  if (!strokes.length || !kwDb) return;
  hwStatEl.textContent = 'Recognizing…';
  const candidates = recognize(strokes, kwDb, 12);
  candidatesEl.innerHTML = '';
  candidates.forEach(c => {
    const el = document.createElement('div');
    el.className = 'candidate';
    el.innerHTML = `<span class="candidate-char">${c.char}</span><span class="candidate-score">${c.score.toFixed(1)}</span>`;
    el.addEventListener('click', () => confirmChar(c.char, el));
    candidatesEl.appendChild(el);
  });
  hwStatEl.textContent = `${candidates.length} candidates`;
}

function confirmChar(char, el) {
  document.querySelectorAll('.candidate').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  userTextEl.value += char;
  clearTimeout(saveTimer); saveTimer = setTimeout(saveRegion, 600);
  setTimeout(clearCanvas, 250);
}

clearBtnEl.addEventListener('click', clearCanvas);
function clearCanvas() {
  hwCtx.clearRect(0, 0, hwCanvasEl.width, hwCanvasEl.height);
  strokes = []; currentStroke = [];
  clearTimeout(recogTimer); candidatesEl.innerHTML = '';
  hwStatEl.textContent = activeIdx !== null ? 'Draw a character' : 'Select a region';
  strokeCntEl.textContent = '0 strokes';
}

// ── Util ───────────────────────────────────────────────────────────────────────

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Init ───────────────────────────────────────────────────────────────────────

await loadLibrary();
</script>
</body>
</html>
